# TODO markers are intentional roadmap signals (e.g. unimplemented referrals
# and extensible-match filters), not lint violations.
Documentation/DocumentationAdmonition:
  Enabled: false

# integration_helper is shared support for the integration suite, not a spec file
# (like spec_helper). Keep the default spec_helper exemption too.
Lint/SpecFilename:
  IgnoredFilenames:
    - spec_helper
    - integration_helper
